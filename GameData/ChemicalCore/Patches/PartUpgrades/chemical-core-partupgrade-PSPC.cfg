PART
{
	name = chemical-core-icon-PSPC
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalCore/Assets/Icons/icon_plane
		texture = icon_Kerosene, ChemicalCore/Assets/Icons/icon_PSPC
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-core-partupgrade-PSPC
	partIcon = chemical-core-icon-PSPC
	entryCost = 0
	title = #LOC_ChemicalCore_PSPC_title
	manufacturer = #LOC_ChemicalCore_solids_manufacturer_title
	description = #LOC_ChemicalCore_PSPC_description
	techRequired = ChemicalCore_PSPC
}
@PARTUPGRADE[chemical-core-partupgrade-PSPC]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[PSPC]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[PSPC]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}