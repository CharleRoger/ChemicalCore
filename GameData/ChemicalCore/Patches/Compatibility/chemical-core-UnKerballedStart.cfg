@TechTree:NEEDS[UnKerballedStart]:BEFORE[ChemicalCore]
{
	%x0 = -3800
	%x1 = -3600
	%x2 = -3400
	%x3 = -3200
	%x4 = -3000
	%x5 = -2800
	%x6 = -2600
	%x7 = -2400
	%x8 = -2200

	%y0 = 1910
	%y1 = 1968
	%y2 = 2026
	%y3 = 2084
	%y4 = 2142
	%y5 = 2200
}

@TechTree:NEEDS[UnKerballedStart]:FOR[zzzzUnKerballedStart]
{
	@RDNode:HAS[#id[generalRocketry]]
	{
		@pos = -3400,2110,0
	}
	@RDNode:HAS[#id[advRocketry]]
	{
		@pos = -3200,2110,0
	}
	@RDNode:HAS[~id[ChemicalCore_*],~id[tier*]],*
	{
		%posX = #$pos$
		@posX ^= :(.*?)\,.*?\,0:$1:

		%posY = #$pos$
		@posY ^= :.*?\,(.*?)\,0:$1:
		@posY *= 0.825
		@posY += 37

		%pos = #$posX$,$posY$,0
	}
}