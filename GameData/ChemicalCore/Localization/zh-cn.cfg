		// Chemical Technologies resource descriptions
		#LOC_ChemicalCore_Aniline_description = 苯胺是一种基础的自燃燃料，意味着它与某些氧化剂（如硝酸）接触即可自发燃烧，无需点火装置。
		#LOC_ChemicalCore_Diborane_description = 二硼烷是一种低温燃料，是甲烷的异类替代品，比五硼烷具有显著更高的比冲，同样有毒。\n\n其气态形态会自燃，因此必须保持低温。
		#LOC_ChemicalCore_Ethanol_description = 乙醇易于获取，操作相对简单，其燃烧推力足以将你的初级火箭送上天。\n\n一份独立的风险评估报告指出，最大的安全隐患是醉酒的测试工程师。
		#LOC_ChemicalCore_HTP_description = 高浓度过氧化氢（HTP）在催化剂作用下分解为高温的蒸汽和氧气混合物，使其足以作为一种基本的火箭推进剂使用。\n\n其高密度使其在某些应用中相比性能更高的氧化剂更具优势。
		#LOC_ChemicalCore_HTPB_description = 端羟基聚丁二烯（HTPB）是一种现代共聚物黏结剂，比 PBAN 更易于操作且生产速度更快。\n\n尽管这些优势较为微弱，但它们使我们的工程师能够完善推进剂混合物，从而最大化任何固体火箭助推器的功率输出。
		#LOC_ChemicalCore_Hydrazine_description = 肼在催化剂作用下剧烈分解为氨、氮和氢，形成高性能的单组元推进剂，也是更高性能的自燃燃料。\n\n用途广泛，但极其有毒且成本不低。
		#LOC_ChemicalCore_IWFNA_description = 硝酸是一种基础氧化剂，可与多种燃料良好反应，但性能不如液氧。\n\n由于其高反应性，如果能找到合适的燃料搭配，它就是很好的自燃氧化剂候选。
		#LOC_ChemicalCore_Kerosene_description = 煤油是一种广泛使用的燃料，可用于喷气发动机或双组元火箭。\n\n我们的工程师在使其与液氧点火方面遇到了一些困难，但它能与多种性能较低的氧化剂良好燃烧。
		#LOC_ChemicalCore_LqdAmmonia_description = 液氨可以与液氧在化学火箭中燃烧（如果你能找到支持的发动机），但性能相当低下。\n\n或者将核热火箭中的氢换成氨，可大幅提高推力并简化推进剂处理，代价是比冲明显降低。
		#LOC_ChemicalCore_LqdCO_description = 一氧化碳可以与氢气反应生成复杂的液态烃类，并且它是一种强还原剂，在双组元火箭系统中可能作为氧化剂，具有特定应用价值。
		#LOC_ChemicalCore_LqdCO2_description = 二氧化碳在其他行星的大气中十分丰富，并且可以作为合成简单烃类的前驱物，因此是原位资源利用的理想目标。
		#LOC_ChemicalCore_LqdFluorine_description = 氟是氧的“愤怒哥哥”，与一切反应并腐蚀所有接触表面。\n\n几乎可以与任何燃料组合获得无与伦比的性能，同时伴随着国家级事故的风险。
		#LOC_ChemicalCore_LqdHydrogen_description = 氢可作为化学燃料用于氢氧双组元系统，也可作为核热火箭中的惰性反应质量。\n\n它是高比冲应用中的天然选择，但其低分子质量也带来了低密度，因此需要使用大型储罐。
		#LOC_ChemicalCore_LqdMethane_description = 甲烷在性能与燃料密度之间提供了良好折中，并且相比煤油或肼更易于原位制造（如果你喜欢那种玩法）。\n\n它也可以注入核热火箭中，在牺牲部分比冲的同时带来显著推力提升。
		#LOC_ChemicalCore_LqdNitrogen_description = 氮气在简单化学物质中几乎算是最不活泼的（仅次于惰性气体），但在适当条件下也可以与氢气反应生成氨以及更复杂的分子。
		#LOC_ChemicalCore_LqdOxygen_description = 液氧便宜、丰富且易于通过水电解在异地制造，但需保持低温以防沸腾。\n\n是大多数双组元发动机的标准氧化剂。
		#LOC_ChemicalCore_N2F4_description = 氧与四氧化二氮的关系，就像氟与四氟肼（N2F4）一样，后者虽不如前者活泼，但更加昂贵。\n\n不过这种东西可不是闹着玩的，若正确处理，就能获得顶级自燃性能。
		#LOC_ChemicalCore_NTO_description = 四氧化二氮（NTO）操作不便，但是一种优秀的氧化剂，与肼等燃料自燃，性能相当不错。\n\n据说味道极其难闻。
		#LOC_ChemicalCore_PBAN_description = 聚丁二烯丙烯腈（PBAN）是一PSPC 的进阶替代品，因此价格更高，适用于固体推进剂粘结剂。\n\n它可调配出更复杂的推进剂混合物，比如含金属粉末，以实现更高性能。
		#LOC_ChemicalCore_Pentaborane_description = 五硼烷具有极高的性能，并能与自燃氧化剂轻松点燃。\n\n据说它是我们权限范围内最毒的物质之一，建议别在大气层中使用，放心就好。
		#LOC_ChemicalCore_PSPC_description = 多硫化物推进剂复合材料（PSPC）是一种基本的固体推进剂粘结剂，通常与高氯酸铵配合使用。\n\n固体火箭虽不如液体双组元系统性能强大，但它能让你迅速起飞。
		#LOC_ChemicalCore_TEATEB_description = TEA-TEB 是三乙基铝与三乙基硼的混合物，二者均高度有毒且接触多种物质即自燃。\n\n关键在于 TEA-TEB 与液氧自燃，因此向燃烧室喷入 TEA-TEB 可以轻松点火任何燃料，即便是难点燃的煤油也不例外。
		#LOC_ChemicalCore_Water_description = 生命之源，如果具备合适的技术，它还可以通过电化学方式分解为高效率的火箭推进剂。
	}
